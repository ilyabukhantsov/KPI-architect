<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - KPI Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #1a73e8; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .task-item { background: #f8f9fa; border-left: 5px solid #1a73e8; padding: 10px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .delete-btn { background-color: #d93025; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📋 Менеджер завдань</h2>
    
    <input type="text" id="name" placeholder="Назва завдання...">
    <input type="text" id="description" placeholder="Опис...">
    <button onclick="createTask()">Додати завдання</button>

    <div id="tasksList"></div>
</div>

<script>
    const API_BASE = '/api/tasks';

    // Отримання всіх завдань
    async function fetchTasks() {
        const response = await fetch(API_BASE);
        const tasks = await response.json();
        const container = document.getElementById('tasksList');
        container.innerHTML = '';

        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div>
                    <strong>${task.name}</strong><br>
                    <small>${task.description || 'Немає опису'}</small>
                </div>
                <button class="delete-btn" onclick="deleteTask(${task.id})">Видалити</button>
            `;
            container.appendChild(div);
        });
    }

    // Створення завдання
    async function createTask() {
        const name = document.getElementById('name').value;
        const description = document.getElementById('description').value;

        if (!name) return alert('Введіть назву!');

        const taskData = {
            name: name,
            description: description,
            dueDate: new Date().toISOString().split('T')[0] // Сьогоднішня дата
        };

        await fetch(API_BASE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(taskData)
        });

        document.getElementById('name').value = '';
        document.getElementById('description').value = '';
        fetchTasks();
    }

    // Видалення завдання
    async function deleteTask(id) {
        await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        fetchTasks();
    }

    // Завантажити при старті
    fetchTasks();
</script>

</body>
</html>
